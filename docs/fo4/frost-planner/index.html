<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FROST Perk Planner</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="header">
    <div class="title-block">
      <h1>FROST <span>Perk Planner</span></h1>
      <div class="mod-versions">FROST Survival Simulator[0.55] + Frost Official Updates (Redux)[2.2.3] + FROST Plus[0.5.2] + FROST Cell Fixes (FCF)[2.5]</div>
    </div>
    <div class="header-controls">
      <div class="header-controls-row">
        <label class="level-selector">
          Level <input type="number" id="level-input" min="0" max="50" value="0">
        </label>
        <div id="special-display" class="points-display"></div>
        <div id="perk-display" class="points-display"></div>
      </div>
      <label class="youre-special-toggle">
        <input type="checkbox" id="youre-special-check">
        You're S.P.E.C.I.A.L.
      </label>
    </div>
    <div class="header-actions">
      <button id="btn-share" class="btn-share" title="Copy share link">&#x1f517; Share</button>
      <button id="btn-reset" class="btn-reset" title="Reset all">&#x21bb; Reset</button>
    </div>
  </div>

  <div id="special-row" class="special-row"></div>
  <div id="perk-grid" class="perk-grid"></div>

  <div class="non-special">
    <h2>NON-S.P.E.C.I.A.L. PERKS</h2>
    <div id="ns-grid" class="non-special-grid"></div>
  </div>

  <div id="tooltip" class="tooltip"></div>

  <script src="perks.js"></script>
  <script src="app.js"></script>
  <script data-goatcounter="https://swdev.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>
</body>
</html>
